# Custom dist publish job: publishes the workspace crates to crates.io in
# dependency order. dist invokes this during the release's publish phase (see
# `publish-jobs = ["./publish-crates"]` in the dist config), passing the plan and
# inheriting repo secrets — so it runs on the same `v*` tag that builds binaries.
name: publish-crates

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master

      # Dependency order: model -> core -> cli. `cargo publish` waits for each
      # crate to appear on the index before the next one is published.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish --locked -p oxcode-model
          cargo publish --locked -p oxcode-core
          cargo publish --locked -p oxcode-cli
